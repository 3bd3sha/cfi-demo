# Prometheus Configuration for CFI Trading Platform
# Docker Compose version - monitors local containers

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'cfi-local'
    environment: 'dev'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alert rules
rule_files:
  - "alert_rules.yml"

# Scrape configurations
scrape_configs:
  # Sample Trading App
  - job_name: 'trading-api'
    static_configs:
      - targets: ['sample-app:8000']
        labels:
          version: 'stable'
          service: 'trading-api'
  
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
  
  # Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
