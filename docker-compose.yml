# CFI Trading Platform - Local Docker Demo
# This runs the complete stack locally for testing and demonstration

services:
  # ==========================================================================
  # MONITORING STACK
  # ==========================================================================
  
  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: cfi-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - cfi-network
    restart: unless-stopped
  
  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: cfi-grafana
    ports:
      - "4500:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - cfi-network
    restart: unless-stopped
    depends_on:
      - prometheus
  
  # Alertmanager - Alert routing
  alertmanager:
    image: prom/alertmanager:latest
    container_name: cfi-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - cfi-network
    restart: unless-stopped
  
  # ==========================================================================
  # SAMPLE APPLICATION (For generating metrics)
  # ==========================================================================
  
  sample-app:
    image: python:3.11-slim
    container_name: cfi-sample-app
    ports:
      - "8000:8000"
    volumes:
      - ./sample-app:/app
    working_dir: /app
    command: >
      sh -c "pip install -q flask prometheus-client &&
             python app.py"
    networks:
      - cfi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  cfi-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data: